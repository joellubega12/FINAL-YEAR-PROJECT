{% extends "voting/base.html" %}
{% load static %}

{% block content %}
<style>
    /* Consistent UI with Registration Page */
    body {
    background: url("{% static 'images/bg.png' %}") no-repeat center center fixed;
    background-size: cover;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

    .login-container {
        margin-top: 80px;
    }

    .login-box-body {
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: none;
    }

    /* Input Styling */
    .form-control {
        height: 48px;
        border-radius: 8px;
        border: 1px solid #ddd;
        padding: 10px 15px;
        transition: all 0.3s ease;
        font-size: 15px;
    }

    .form-control:focus {
        border-color: #3c8dbc;
        box-shadow: 0 0 0 3px rgba(60, 141, 188, 0.1);
        outline: none;
    }

    /* Icon placement tweak */
    .form-control-feedback {
        line-height: 48px;
        color: #aaa;
    }

    /* Button Styling */
    .btn-flat {
        border-radius: 8px !important;
        padding: 12px;
        font-weight: 600;
        border: none;
        transition: transform 0.2s;
    }

    .btn-flat:active {
        transform: scale(0.98);
    }

    .btn-success {
        background-color: #2ecc71;
        box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2);
    }

    .btn-warning {
        background-color: #f39c12;
        color: white !important;
        box-shadow: 0 4px 10px rgba(243, 156, 18, 0.2);
    }

    .login-logo b {
        letter-spacing: 1px;
        color: #333;
    }

    .footer-links {
        margin-top: 25px;
        text-align: center;
    }
</style>

<div class="container login-container">
    <div class="row">
        <div class="col-md-4 col-md-offset-4 col-sm-6 col-sm-offset-3 col-xs-10 col-xs-offset-1">
            
            <div class="login-logo text-center">
                <img src="{% static 'images/logo.png' %}" width="90" style="margin-bottom: 15px;">
                <h3 class="mt-2"><b>VOTLY</b></h3>
            </div>

            <div class="login-box-body">
                <form action="{% url 'account_login' %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="form-group has-feedback">
                        <input type="text" class="form-control" name="email" placeholder="Email Address" required>
                        <span class="glyphicon glyphicon-envelope form-control-feedback"></span>
                    </div>

                    <div class="form-group has-feedback">
                        <input type="password" class="form-control" name="password" placeholder="Password" required>
                        <span class="glyphicon glyphicon-lock form-control-feedback"></span>
                    </div>

                    <div style="margin-top: 25px;">
                        <button type="submit" class="btn btn-success btn-block btn-flat" name="login">
                            <i class="fa fa-sign-in"></i> &nbsp; Log In
                        </button>
                    </div>

                    <div class="footer-links">
                        <p class="text-muted small">Don't have an account?</p>
                        <a class="btn btn-warning btn-block btn-flat" href="{% url 'account_register' %}">
                            <i class="fa fa-user-plus"></i> &nbsp; Register Now
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
